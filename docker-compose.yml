version: '3.8'

services:
  # PostgreSQL Database (optional - only used if DATABASE_URL not in .env)
  # Start with: docker-compose --profile local-db up
  db:
    image: postgres:15-alpine
    container_name: roommate-db
    profiles:
      - local-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: roommate_expense_splitter
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend FastAPI Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: roommate-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Fallback to local db if DATABASE_URL not set
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@db:5432/roommate_expense_splitter}
      - TEST_DATABASE_URL=${TEST_DATABASE_URL:-postgresql://postgres:postgres@db:5432/roommate_expense_splitter_test}
    volumes:
      - ./backend:/app
    command: sh -c "uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  # Frontend React Service
  frontend:
    build:
      context: ./FrontEnd
      dockerfile: Dockerfile
    container_name: roommate-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./FrontEnd:/app
      - /app/node_modules
    stdin_open: true
    tty: true

volumes:
  postgres_data:
